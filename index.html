<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crowns — UX Delivery</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --fg:#1a1a1a; --muted:#6b6b6b;
    --border:rgba(0,0,0,.12); --border-soft:rgba(0,0,0,.07); --strong:#262626;
    --shadow:0 1px 2px rgba(0,0,0,.06),0 10px 30px -16px rgba(0,0,0,.18);
    --radius:16px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font);-webkit-font-smoothing:antialiased;line-height:1.5}
  .wrap{position:relative;max-width:1120px;margin:0 auto;padding:54px 24px 80px}
  /* language switch */
  .lang{position:absolute;top:16px;right:24px;z-index:10;display:flex;gap:3px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:3px;box-shadow:var(--shadow);font-family:var(--mono);font-size:12px}
  .lang button{border:none;background:transparent;color:var(--muted);padding:6px 11px;border-radius:7px;cursor:pointer;font:inherit;font-weight:600;letter-spacing:.03em}
  .lang button.on{background:var(--strong);color:#fff}
  /* header logos */
  .logos{display:flex;align-items:center;justify-content:center;gap:22px;margin-bottom:40px}
  .logos img{height:28px;width:auto;display:block}
  .logos .x{color:var(--muted);font-size:18px;font-weight:300}
  /* intro */
  .kicker{font-family:var(--mono);font-size:12.5px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;text-align:center;margin-bottom:14px}
  h1{font-size:34px;line-height:1.15;letter-spacing:-.5px;text-align:center;margin:0 auto 16px;max-width:780px;font-weight:700}
  .lead{text-align:center;color:var(--muted);font-size:15.5px;max-width:680px;margin:0 auto 14px}
  .pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:22px auto 0;max-width:780px}
  .pill{font-size:12px;color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:5px 12px;background:var(--card)}
  /* cards */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:48px}
  @media(max-width:860px){.grid{grid-template-columns:1fr;max-width:440px;margin-left:auto;margin-right:auto}}
  .card{position:relative;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;transition:transform .16s ease,box-shadow .16s ease}
  .card:hover{transform:translateY(-3px);box-shadow:0 2px 4px rgba(0,0,0,.06),0 22px 48px -20px rgba(0,0,0,.28)}
  .card-disabled{pointer-events:none}
  .card-disabled:hover{transform:none;box-shadow:var(--shadow)}
  .cs-overlay{position:absolute;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;background:rgba(246,247,249,.78);backdrop-filter:blur(3px)}
  .cs-badge{font-family:var(--mono);font-size:11.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:var(--strong);padding:9px 22px;border-radius:100px;box-shadow:0 2px 12px rgba(0,0,0,.18)}
  .thumb{position:relative;border-bottom:1px solid var(--border-soft);aspect-ratio:16/10;overflow:hidden}
  .thumb svg{width:100%;height:100%;display:block}
  .num{position:absolute;top:12px;left:12px;font-family:var(--mono);font-size:11px;font-weight:600;background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:7px;padding:3px 8px;backdrop-filter:blur(4px)}
  .body{padding:20px 20px 22px;display:flex;flex-direction:column;flex:1}
  .tag{font-family:var(--mono);font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .card h3{font-size:18px;margin:0 0 8px;letter-spacing:-.2px}
  .card p{font-size:13.5px;color:var(--muted);margin:0 0 18px;flex:1}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-size:14px;font-weight:600;text-decoration:none;border-radius:10px;padding:11px 16px;border:1px solid transparent;cursor:pointer}
  .btn.primary{background:var(--strong);color:#fff}
  .btn.primary:hover{background:#000}
  .foot{margin-top:56px;text-align:center;color:var(--muted);font-size:12.5px;border-top:1px solid var(--border-soft);padding-top:22px}
</style>
</head>

  function setLang(l){
    var d = I18N[l] || I18N.en;
    document.querySelectorAll("[data-i18n]").forEach(function(el){
